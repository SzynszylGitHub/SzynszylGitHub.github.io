<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS BIO - Creating a Biocomputer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- SECTION 1: HERO (Inspirowane górnym panelem p3) -->
    <header class="site-header">
        <div class="logo">NEXUS</div>
        <div class="menu-toggle">
            <span></span>
            <span></span>
        </div>
    </header>

    <main>
        <section class="hero-section">
            <div class="hero-container">
                <div class="hero-left">
                    <span class="subtitle-tag">HACKING THE CELL</span>
                    <h1 class="hero-title">Creating a<br>Biocomputer</h1>
                    <a href="#" class="btn-action">WATCH VIDEO <span class="arrow">→</span></a>
                    
                    <div class="carousel-controls">
                        <button class="ctrl-btn prev">←</button>
                        <button class="ctrl-btn next">→</button>
                    </div>
                </div>
                
                <div class="hero-right">
                    <!-- Wielowarstwowa struktura organiczna emulująca render z p3 -->
                    <div class="biomorphic-container">
                        <div class="blob-core"></div>
                        <div class="blob-glow-1"></div>
                        <div class="blob-glow-2"></div>
                        <div class="blob-particle p1"></div>
                        <div class="blob-particle p2"></div>
                    </div>
                    <div class="page-indicator">01 <span>/ 05</span></div>
                </div>
            </div>
        </section>

        <!-- SECTION 2: COLUMNS / FEATURES (Inspirowane środkowym panelem p3) -->
        <section class="features-section">
            <div class="features-grid">
                
                <div class="feature-col">
                    <div class="col-top">
                        <span class="col-num">01</span>
                        <div class="col-icon">
                            <!-- DNA / Bio Icon -->
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M4.5 10.5C4.5 7.46243 6.96243 5 10.5 5C13.5376 5 16 7.46243 16 10.5C16 13.5376 13.5376 16 10.5 16" />
                                <path d="M19.5 13.5C19.5 16.5376 17.0376 19 13.5 19C10.4624 19 8 16.5376 8 13.5C8 10.4624 10.4624 8 13.5 8" />
                            </svg>
                        </div>
                    </div>
                    <div class="col-bottom">
                        <h3 class="col-title">Product</h3>
                        <a href="#" class="col-link">WATCH VIDEO</a>
                        <div class="col-arrow">↓</div>
                    </div>
                </div>

                <div class="feature-col">
                    <div class="col-top">
                        <span class="col-num">02</span>
                        <div class="col-icon">
                            <!-- Neuro / Pulse Icon -->
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M3 12H7L10 19L14 5L17 12H21" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                    </div>
                    <div class="col-bottom">
                        <h3 class="col-title">Performance</h3>
                        <a href="#" class="col-link">OUR RESULTS</a>
                        <div class="col-arrow">↓</div>
                    </div>
                </div>

                <div class="feature-col">
                    <div class="col-top">
                        <span class="col-num">03</span>
                        <div class="col-icon">
                            <!-- Media / Play Icon -->
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <polygon points="6 3 20 12 6 21 6 3"/>
                            </svg>
                        </div>
                    </div>
                    <div class="col-bottom">
                        <h3 class="col-title">Media</h3>
                        <a href="#" class="col-link">SHOW MORE</a>
                        <div class="col-arrow">↓</div>
                    </div>
                </div>

                <div class="feature-col">
                    <div class="col-top">
                        <span class="col-num">04</span>
                        <div class="col-icon">
                            <!-- Humanoid / Core Icon -->
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="9"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </div>
                    </div>
                    <div class="col-bottom">
                        <h3 class="col-title">Price</h3>
                        <a href="#" class="col-link">BIO-COMPONENTS</a>
                        <div class="col-arrow">↓</div>
                    </div>
                </div>

            </div>
        </section>

        <!-- SECTION 3: FOOTER CALL TO ACTION (Inspirowane dolnym panelem p3) -->
        <section class="cta-section">
            <div class="cta-bg-blend"></div>
            <div class="cta-content">
                <span class="cta-tag">BETTER THAN QUANTUM</span>
                <h2 class="cta-logo">NEXUS</h2>
                <span class="cta-sublogo">BIOCOMPUTER</span>
                <div class="cta-action-box">
                    <a href="#" class="btn-action outline">PRE-ORDER NOW <span class="arrow">→</span></a>
                </div>
            </div>
        </section>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
